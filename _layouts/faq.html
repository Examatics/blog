<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | Examatics FAQ</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="brand">
        <span class="site-logo"></span>
        <span class="logo-text">
          <span class="logo-part-1">EXAM</span><span class="logo-part-2">ATICS</span>
        </span>
        <span>FAQs</span>
      </a>
      <nav class="header-nav left-nav" style="float:left;">
        <button id="menu-toggle" aria-label="Open menu" aria-expanded="false" aria-controls="collapsible-menu" style="background:none;border:none;cursor:pointer;font-size:1.2em;padding:0 1em;">
        Menu
        </button>
        <div id="collapsible-menu" class="collapsible-menu" style="display:none;position:absolute;z-index:1000;background:#fff;border:1px solid #eee;box-shadow:0 2px 8px rgba(0,0,0,0.07);padding:1em 2em;left:1em;top:3em;min-width:180px;">
          <ul style="list-style:none;padding:0;margin:0;">
            <li><a href="/about/">About</a></li>
            <li><a href="/">Articles</a></li>
            <li><a href="/faq/">FAQs</a></li>
          </ul>
        </div>
      </nav>
      <nav class="header-nav explore-all" style="float:right;">
        <a href="https://examatics.ai">Explore App</a>
      </nav>
    </div>
    <script>
      // Collapsible menu toggle
      const menuToggle = document.getElementById('menu-toggle');
      const menu = document.getElementById('collapsible-menu');
      if (menuToggle && menu) {
        menuToggle.addEventListener('click', function() {
          const expanded = menuToggle.getAttribute('aria-expanded') === 'true';
          menu.style.display = expanded ? 'none' : 'block';
          menuToggle.setAttribute('aria-expanded', !expanded);
        });
        // Hide menu when clicking outside
        document.addEventListener('click', function(e) {
          if (!menu.contains(e.target) && !menuToggle.contains(e.target)) {
            menu.style.display = 'none';
            menuToggle.setAttribute('aria-expanded', 'false');
          }
        });
      }
    </script>
  </header>
  <div class="page-wrap faq-page">
    <nav class="breadcrumb" aria-label="breadcrumb">
      <a href="/">Home</a>
      <span class="bc-sep">›</span>
      <span class="bc-current">FAQs</span>
    </nav>
    <main class="content-pane">
      <h1 class="faq-title">{{ page.title }}</h1>
      {% if page.description %}<p class="faq-desc">{{ page.description }}</p>{% endif %}
      <div class="faq-content">
        {{ content }}
      </div>
    </main>
  </div>
  <footer class="site-footer">
    <div class="footer-inner">
      <span class="footer-copy">© {{ site.time | date: "%Y" }} Examatics. All rights reserved.</span>
      <nav class="footer-nav">
        <a href="/privacy-policy/">Privacy Policy</a>
        <a href="mailto:hello@examatics.com">Contact</a>
        <a href="/about/">About</a>
      </nav>
    </div>
  </footer>
</body>
</html>
